<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos | IFSCome & Bebe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --soft-red: #f8d7da;
            --accent-red: #e35d5d;
            --dark-red: #c0392b;
            --white: #ffffff;
            --text: #2c3e50;
            --muted: #7f8c8d;
            --border: #f0d3d6;
            --success-bg: #d4edda;
            --success-text: #155724;
            --warning-bg: #fff3cd;
            --warning-text: #856404;
            --info-bg: #d1ecf1;
            --info-text: #0c5460;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            margin: 0;
            color: var(--text);
        }

        .top-link {
            display: inline-block;
            margin: 20px 20px 0;
            text-decoration: none;
            color: var(--accent-red);
            font-weight: 600;
        }

        header {
            background-color: var(--white);
            padding: 35px 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent-red);
        }

        header h1 {
            margin: 0;
            color: var(--dark-red);
            font-size: 2.4rem;
            letter-spacing: -1px;
        }

        .container {
            max-width: 1100px;
            margin: 35px auto;
            padding: 0 20px 40px;
        }

        .card {
            background: var(--white);
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border-top: 5px solid var(--soft-red);
        }

        .card h2 {
            margin-top: 0;
            color: var(--dark-red);
            font-size: 1.4rem;
        }

        .resumo-boxes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .resumo-item {
            background: #fff7f7;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
        }

        .resumo-item strong {
            display: block;
            color: var(--dark-red);
            font-size: 1.5rem;
            margin-top: 8px;
        }

        .resumo-item span {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .tabela-wrapper {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
            vertical-align: top;
        }

        th {
            background-color: #fff1f1;
            color: var(--dark-red);
            font-size: 0.9rem;
        }

        tr:hover {
            background-color: #fffafa;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .status-preparo {
            background: var(--warning-bg);
            color: var(--warning-text);
        }

        .status-finalizado {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .status-entregue {
            background: var(--info-bg);
            color: var(--info-text);
        }

        .acoes {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .btn-primary {
            background: var(--accent-red);
            color: var(--white);
        }

        .btn-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-radius: 10px;
            text-decoration: none;
            font-family: inherit;
            font-weight: 600;
            background: var(--dark-red);
            color: var(--white);
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn-link:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .cliente-total-lista {
            margin-top: 18px;
            display: grid;
            gap: 12px;
        }

        .cliente-total-item {
            padding: 14px;
            border-radius: 12px;
            background: #fff7f7;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .cliente-total-item strong {
            color: var(--dark-red);
        }

        .acoes-coluna {
            width: 88px;
            text-align: center;
        }

        .menu-acoes {
            position: relative;
            display: inline-block;
        }

        .botao-menu {
            background: #fff4f4;
            color: var(--dark-red);
            border: 1px solid var(--border);
            padding: 8px 12px;
            line-height: 1;
            font-size: 1.1rem;
        }

        .dropdown-acoes {
            display: none;
            position: absolute;
            right: 0;
            top: 42px;
            min-width: 160px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            z-index: 10;
        }

        .dropdown-acoes a,
        .dropdown-acoes button {
            display: block;
            width: 100%;
            padding: 12px 14px;
            background: transparent;
            border: none;
            border-radius: 0;
            text-align: left;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            font-size: 0.92rem;
            cursor: pointer;
        }

        .dropdown-acoes a:hover,
        .dropdown-acoes button:hover {
            background: #fff4f4;
            transform: none;
            opacity: 1;
        }

        .menu-acoes.aberto .dropdown-acoes {
            display: block;
        }
    </style>
</head>
<body>
    <a href="menu.html" class="top-link">← Voltar ao Início</a>

    <header>
        <h1>Pedidos do Restaurante</h1>
    </header>

    <div class="container">
        <section class="card">
            <h2>Visão Geral dos Pedidos</h2>

            <div class="resumo-boxes">
                <div class="resumo-item">
                    <span>Pedidos Hoje</span>
                    <strong id="resumoPedidosHoje">0</strong>
                </div>
                <div class="resumo-item">
                    <span>Em Preparo</span>
                    <strong id="resumoEmPreparo">0</strong>
                </div>
                <div class="resumo-item">
                    <span>Faturamento</span>
                    <strong id="resumoFaturamento">R$ 0,00</strong>
                </div>
            </div>

            <div class="acoes">
                <button class="btn-primary" onclick="carregarPedidos()">Atualizar Lista</button>
                <a href="novo-pedido.html" class="btn-link">+ Novo Pedido</a>
            </div>

            <div class="tabela-wrapper">
                <table id="tabelaPedidos">
                    <thead>
                        <tr>
                            <th>Pedido</th>
                            <th>Cliente</th>
                            <th>Status</th>
                            <th>Itens</th>
                            <th>Total</th>
                            <th class="acoes-coluna">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabelaPedidos"></tbody>
                </table>
            </div>
        </section>

        <section class="card" style="margin-top: 25px;">
            <h2>Total de Pedidos por Cliente</h2>
            <div class="cliente-total-lista" id="listaTotais"></div>
        </section>
    </div>

    <script>
        function obterDataHojeLocal() {
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes = String(hoje.getMonth() + 1).padStart(2, '0');
            const dia = String(hoje.getDate()).padStart(2, '0');
            return `${ano}-${mes}-${dia}`;
        }

        function atualizarResumo(pedidos) {
            const hoje = obterDataHojeLocal();

            const pedidosHoje = pedidos.filter(pedido => pedido.dataPedido === hoje).length;
            const emPreparo = pedidos.filter(pedido => pedido.status === 'em preparo').length;
            const faturamento = pedidos.reduce((soma, pedido) => soma + Number(pedido.total || 0), 0);

            document.getElementById('resumoPedidosHoje').textContent = pedidosHoje;
            document.getElementById('resumoEmPreparo').textContent = emPreparo;
            document.getElementById('resumoFaturamento').textContent =
                `R$ ${faturamento.toFixed(2).replace('.', ',')}`;
        }

        async function carregarTotaisPorCliente() {
            const listaTotais = document.getElementById('listaTotais');

            try {
                const response = await fetch('http://localhost:3000/pedidos-total-por-cliente');
                const totais = await response.json();

                listaTotais.innerHTML = '';

                if (!response.ok) {
                    throw new Error(totais.erro || 'Erro ao buscar totais por cliente.');
                }

                if (totais.length === 0) {
                    listaTotais.innerHTML = `
                        <div class="cliente-total-item">
                            <span>Nenhum cliente encontrado</span>
                            <strong>R$ 0,00</strong>
                        </div>
                    `;
                    return;
                }

                totais.forEach(item => {
                    const bloco = document.createElement('div');
                    bloco.className = 'cliente-total-item';
                    bloco.innerHTML = `
                        <span>${item._id || 'Cliente sem nome'}</span>
                        <strong>R$ ${Number(item.totalGasto || 0).toFixed(2).replace('.', ',')}</strong>
                    `;
                    listaTotais.appendChild(bloco);
                });
            } catch (erro) {
                console.error('Erro ao carregar totais por cliente:', erro);
                listaTotais.innerHTML = `
                    <div class="cliente-total-item">
                        <span>Erro ao carregar clientes</span>
                        <strong>R$ 0,00</strong>
                    </div>
                `;
            }
        }

        async function carregarPedidos() {
            const corpoTabela = document.getElementById('corpoTabelaPedidos');

            try {
                const response = await fetch('http://localhost:3000/pedidos');
                const pedidos = await response.json();

                corpoTabela.innerHTML = '';

                if (!response.ok) {
                    throw new Error(pedidos.erro || 'Erro ao buscar pedidos.');
                }

                atualizarResumo(pedidos);
                await carregarTotaisPorCliente();

                if (pedidos.length === 0) {
                    corpoTabela.innerHTML = `
                        <tr>
                            <td colspan="6">Nenhum pedido cadastrado ainda.</td>
                        </tr>
                    `;
                    return;
                }

                pedidos.forEach(pedido => {
                    let classeStatus = 'status-preparo';

                    if (pedido.status === 'finalizado') {
                        classeStatus = 'status-finalizado';
                    } else if (pedido.status === 'entregue') {
                        classeStatus = 'status-entregue';
                    }

                    const idPedido = pedido.idPedido || '';
                    const linha = document.createElement('tr');
                    linha.innerHTML = `
                        <td>${idPedido || '-'}</td>
                        <td>${pedido.cliente || '-'}</td>
                        <td><span class="status-badge ${classeStatus}">${pedido.status || '-'}</span></td>
                        <td>${pedido.itens || '-'}</td>
                        <td>R$ ${Number(pedido.total || 0).toFixed(2).replace('.', ',')}</td>
                        <td class="acoes-coluna">
                            <div class="menu-acoes">
                                <button class="botao-menu" type="button" onclick="alternarMenu(this)">⋮</button>
                                <div class="dropdown-acoes">
                                    <a href="alterar-pedido.html?id=${encodeURIComponent(idPedido)}">Alterar pedido</a>
                                    <button type="button" onclick="excluirPedido('${idPedido}')">Excluir pedido</button>
                                </div>
                            </div>
                        </td>
                    `;

                    corpoTabela.appendChild(linha);
                });
            } catch (erro) {
                console.error('Erro ao carregar pedidos:', erro);
                corpoTabela.innerHTML = `
                    <tr>
                        <td colspan="6">Erro ao carregar pedidos do banco de dados.</td>
                    </tr>
                `;
            }
        }

        function alternarMenu(botao) {
            const menuAtual = botao.parentElement;
            const jaEstaAberto = menuAtual.classList.contains('aberto');

            document.querySelectorAll('.menu-acoes').forEach(menu => {
                menu.classList.remove('aberto');
            });

            if (!jaEstaAberto) {
                menuAtual.classList.add('aberto');
            }
        }

       async function excluirPedido(idPedido) {
            if (!idPedido) {
                alert('Pedido invalido.');
                return;
            }

            const confirmar = confirm(`Deseja excluir o pedido ${idPedido}?`);
            if (!confirmar) {
                return;
            }

            try {
                const response = await fetch(`http://localhost:3000/pedidos/${encodeURIComponent(idPedido)}`, {
                    method: 'DELETE'
                });

                const resultado = await response.json();

                if (!response.ok) {
                    throw new Error(resultado.erro || 'Erro ao excluir pedido.');
                }

                carregarPedidos();
            } catch (erro) {
                console.error('Erro ao excluir pedido:', erro);
                alert(erro.message || 'Nao foi possivel excluir o pedido.');
            }
        }

        document.addEventListener('click', function(evento) {
            if (!evento.target.closest('.menu-acoes')) {
                document.querySelectorAll('.menu-acoes').forEach(menu => {
                    menu.classList.remove('aberto');
                });
            }
        });

        carregarPedidos();
    </script>
</body>
</html>
