<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Clientes - Restaurante</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; padding: 40px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 0.85em; font-weight: bold; }
        .finalizado { background: #d4edda; color: #155724; }
        .preparo { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 Lista de Clientes e Pedidos</h2>
    <table id="tabelaClientes">
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Status</th>
                <th>Total (R$)</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    async function carregarClientes() {
        try {
            const resposta = await fetch('http://localhost:3000/clientes');
            const clientes = await resposta.json();
            
            const corpoTabela = document.querySelector('#tabelaClientes tbody');
            corpoTabela.innerHTML = ""; // Limpa a tabela antes de preencher

            clientes.forEach(item => {
                const linha = document.createElement('tr');
                
                // Definindo a cor do status baseado no texto
                const classeStatus = item.status === 'finalizado' ? 'finalizado' : 'preparo';

                linha.innerHTML = `
                    <td><strong>${item.cliente}</strong></td>
                    <td><span class="status-badge ${classeStatus}">${item.status}</span></td>
                    <td>R$ ${item.total.toFixed(2)}</td>
                `;
                corpoTabela.appendChild(linha);
            });
        } catch (erro) {
            console.error("Erro ao carregar dados:", erro);
        }
    }

    // Executa a função assim que a página abre
    carregarClientes();
</script>

</body>
</html>
