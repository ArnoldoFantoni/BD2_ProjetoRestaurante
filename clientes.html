<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes | IFSCome & Bebe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --soft-red: #f8d7da;
            --accent-red: #e35d5d;
            --dark-red: #c0392b;
            --white: #ffffff;
            --text: #2c3e50;
            --success-bg: #d4edda;
            --success-text: #155724;
            --warning-bg: #fff3cd;
            --warning-text: #856404;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            margin: 0;
            color: var(--text);
        }

        /* Cabeçalho Padronizado */
        header {
            background-color: var(--white);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent-red);
        }

        header h1 {
            margin: 0;
            color: var(--dark-red);
            font-size: 2.5rem;
            letter-spacing: -1px;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Card Principal */
        .main-card {
            background: var(--white);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--soft-red);
        }

        h2 {
            color: var(--dark-red);
            margin-bottom: 25px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Tabela Estilizada */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid var(--soft-red);
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 1rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Status Badges */
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .finalizado {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .preparo {
            background: var(--warning-bg);
            color: var(--warning-text);
        }

        .total-price {
            font-weight: 600;
            color: var(--accent-red);
        }

        .btn-voltar {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: var(--accent-red);
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-voltar:hover {
            color: var(--dark-red);
        }

    </style>
</head>
<body>

    <header>
        <h1>🍴 IFSCome & Bebe</h1>
        <p>Gestão de Clientes e Pedidos</p>
    </header>

    <div class="container">
        <a href="menu.html" class="btn-voltar">← Voltar ao Início</a>

        <div class="main-card">
            <h2>📋 Lista de Clientes</h2>
            <table id="tabelaClientes">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Status do Pedido</th>
                        <th>Total Gasto</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function carregarClientes() {
            try {
                const resposta = await fetch('http://localhost:3000/clientes');
                const clientes = await resposta.json();
                
                const corpoTabela = document.querySelector('#tabelaClientes tbody');
                corpoTabela.innerHTML = ""; 

                clientes.forEach(item => {
                    const linha = document.createElement('tr');
                    
                    // Lógica do Status (caso venha do banco)
                    const statusTexto = item.status || 'Em preparo';
                    const classeStatus = statusTexto.toLowerCase() === 'finalizado' ? 'finalizado' : 'preparo';
                    
                    // Formatação do preço (caso o total exista)
                    const valorTotal = item.total ? parseFloat(item.total).toFixed(2) : "0.00";

                    linha.innerHTML = `
                        <td><strong>${item.cliente}</strong></td>
                        <td><span class="status-badge ${classeStatus}">${statusTexto}</span></td>
                        <td class="total-price">R$ ${valorTotal}</td>
                    `;
                    corpoTabela.appendChild(linha);
                });
            } catch (erro) {
                console.error("Erro ao carregar dados:", erro);
                document.querySelector('#tabelaClientes tbody').innerHTML = 
                    '<tr><td colspan="3" style="text-align:center; color:red;">Erro ao conectar com o servidor.</td></tr>';
            }
        }

        carregarClientes();
    </script>
</body>
</html>
