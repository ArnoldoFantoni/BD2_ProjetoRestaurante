<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | IFSCome & Bebe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --soft-red: #f8d7da;
            --accent-red: #e35d5d;
            --dark-red: #c0392b;
            --white: #ffffff;
            --text: #2c3e50;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            margin: 0;
            color: var(--text);
        }

        /* Cabeçalho */
        header {
            background-color: var(--white);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent-red);
        }

        header h1 {
            margin: 0;
            color: var(--dark-red);
            font-size: 2.5rem;
            letter-spacing: -1px;
        }

        header p {
            margin-top: 10px;
            color: #888;
            font-style: italic;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Grid do Cardápio */
        .cardapio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Estilo do Card do Prato */
        .item-card {
            background: var(--white);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            border-top: 5px solid var(--soft-red);
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-top-color: var(--accent-red);
        }

        .category-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            background: var(--soft-red);
            color: var(--dark-red);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .item-card h3 {
            margin: 15px 0 10px 0;
            font-size: 1.3rem;
        }

        .item-card p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.4;
            min-height: 40px;
        }

        .price-tag {
            display: block;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent-red);
        }

        .btn-refresh {
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
        }
        .actions-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 0 auto 30px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-family: inherit;
            min-width: 220px;
            background: white;
        }
        .btn-edit {
            display: inline-block;
            margin-top: 15px;
            background-color: var(--white);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-edit:hover {
            background-color: var(--accent-red);
            color: var(--white);
        }
            
    </style>
</head>
<body>
    <a href="menu.html" style="text-decoration:none; color: #e35d5d;">← Voltar ao Início</a>
    <header>
        <h1>🍴 IFSCome & Bebe</h1>
        <p>O melhor tempero da vida acadêmica</p>
    </header>

    <div class="container">
    <div class="actions-bar">
        <button class="btn-refresh" onclick="buscarCardapio()">Atualizar Cardápio</button>

        <select id="filtroTipo" class="filter-select" onchange="filtrarPorTipo()">
            <option value="">Todas as categorias</option>
            <option value="entrada">Entrada</option>
            <option value="principal">Prato Principal</option>
            <option value="sobremesa">Sobremesa</option>
            <option value="bebida">Bebida</option>
        </select>

        <label for="nomePrato">Buscae por prato / bebida</label>
        <!-- <input type="text" class="filter-select" id="nomePrato" placeholder="Ex: Macarronada" required> -->
        <input type="text" class="filter-select" id="nomePrato" placeholder="Ex: Macarronada" required oninput="buscarCardapio()">
    </div>
    
    <div class="cardapio-grid" id="menuContainer">
    </div>
</div>

    <script>
        async function buscarCardapio() {
            console.log("entrou em buscarCardapio()");
            try {
                const tipoSelecionado = document.getElementById('filtroTipo').value;
                const nomePrato = document.getElementById('nomePrato').value;

                //-- adionando os filtros em um objeto parametros
                const parametros = new URLSearchParams();

                if(tipoSelecionado){
                    parametros.append('tipo', tipoSelecionado);
                }
                if(nomePrato){
                    parametros.append('nome', nomePrato);
                }

                //-- para os parameteos para uma estring
                const queryString = parametros.toString();

                const rota = queryString
                    ? `http://localhost:3000/cardapio-completo?${queryString}`
                    : 'http://localhost:3000/cardapio-completo';

                const response = await fetch(rota);
                const pratos = await response.json();

                const container = document.getElementById('menuContainer');
                container.innerHTML = "";

                if (pratos.length === 0) {
                    container.innerHTML = '<p>Nenhum prato encontrado para a categoria selecionada.</p>';
                    return;
                }

                pratos.forEach(prato => {
                    const linkEdicao = `alterar-prato.html?nome=${encodeURIComponent(prato.nome)}`;

                    const card = `
                        <div class="item-card">
                            <span class="category-badge">${prato.tipo}</span>
                            <h3>${prato.nome}</h3>
                            <p>${prato.descricao || 'Sem descrição disponível.'}</p>
                            <span class="price-tag">R$ ${parseFloat(prato.preco).toFixed(2)}</span>
                            
                            <a href="${linkEdicao}" class="btn-edit">
                                <span>✏️ Editar Item</span>
                            </a>
                        </div>

                    `;
                    container.innerHTML += card;
                });

            } catch (error) {
                console.error("Erro ao carregar cardápio:", error);
            }
        }

        function filtrarPorTipo() {
            buscarCardapio();
        }

        buscarCardapio();
    </script>

</body>
</html>
